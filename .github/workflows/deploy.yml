name: Deploy rim.bakudanramen.com

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Copy files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          source: "about.html,accessibility.html,bakudan-redesign.html,blog-authentic.html,blog-chashu.html,blog-journey.html,blog-ramen-101.html,blog-tonkotsu.html,blog.html,fundraiser.html,happy-hour.html,index.html,locations.html,menu.html,order.html,privacy.html,ramen-guide.html,script.js,styles.css,terms.html,css,js,locations"
          target: ${{ secrets.TARGET_DIR }}
          overwrite: true